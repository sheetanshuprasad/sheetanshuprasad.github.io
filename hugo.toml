baseURL = "https://musicmonetized.com/"
languageCode = "en-us"
title = "MusicMonetized"
theme = "PaperMod"
enableRobotsTXT = true
[pagination]
pagerSize = 10
keywords = ["music production", "mixing", "mastering", "music business", "music marketing", "mix engineer", "music producer", "audio engineering", "home studio", "freelancing"]


[params]
description = "Learn music production, mixing, mastering, client acquisition, music marketing, and business strategies to build a successful career in the music industry."
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
fuseOpts = true

defaultTheme = "dark"
disableThemeToggle = true

label = { text = "MusicMonetized", icon = "/logoo.png", iconHeight = 35 }

[params.profileMode]
enabled = false
title = "MusicMonetized"
subtitle = "Learn Music. Build a Career. Helping music producers build skills, clients and income."

[[params.profileMode.buttons]]
name = "Latest Articles"
url = "/posts/"

[[params.profileMode.buttons]]
name = "About"
url = "/about/"

[[params.profileMode.buttons]]
name = "Categories"
url = "/categories/"

[menu]

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 5

[[menu.main]]
identifier = "categories"
name = "Categories"
url = "/categories/"
weight = 10

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 20

[[menu.main]]
identifier = "contact"
name = "Contact"
url = "/contact/"
weight = 30


[params.homeInfoParams]
Title = "Turn Your Music Skills Into a Career"

Content = """
Most music websites teach you **how to produce music**.

**MusicMonetized teaches you how to produce great music, attract clients, grow your audience, and build a sustainable music career.**

Whether you're a music producer, mixing engineer, mastering engineer, songwriter, or independent artist, you'll learn how to:

- Find high-paying music clients
- Improve your production and mixing skills
- Promote your music and grow your audience
- Increase your Spotify listeners and fanbase
- Build multiple income streams
- Turn your passion into a long-term career
"""

[outputs]
home = ["HTML", "RSS", "JSON"]
