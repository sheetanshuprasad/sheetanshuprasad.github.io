baseURL = "https://musicmonetized.com/"
languageCode = "en-us"
title = "MusicMonetized"
theme = "PaperMod"

[pagination]
pagerSize = 10

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
description = "Learn Music. Build a Career."
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true

defaultTheme = "dark"
disableThemeToggle = true

label = { text = "MusicMonetized", icon = "/logoo.png", iconHeight = 35 }

[params.profileMode]
enabled = false
title = "MusicMonetized"
subtitle = "Learn Music. Build a Career. Helping music producers build skills, clients and income."

[[params.profileMode.buttons]]
name = "Latest Articles"
url = "/posts/"

[[params.profileMode.buttons]]
name = "About"
url = "/about/"

[[params.profileMode.buttons]]
name = "Categories"
url = "/categories/"

[menu]

[[menu.main]]
identifier = "categories"
name = "Categories"
url = "/categories/"
weight = 10

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 20

[[menu.main]]
identifier = "contact"
name = "Contact"
url = "/contact/"
weight = 30
[params.homeInfoParams]
Title = "🎵 Build a Career in Music"

Content = """
Most websites teach you **how to make music**.

**MusicMonetized teaches you how to make music and make a living from it.**

Whether you're a music producer, mixing engineer, mastering engineer, or independent artist, you'll learn how to:

-  Find music clients
-  Improve your production and mixing
-  Market your music
-  Build multiple income streams
-  Create a sustainable music career
"""
